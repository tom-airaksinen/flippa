<!doctype html>
<html lang="sv">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Flippa – enhetlig "Lägg till ord" (förslag v3)</title>
<style>
  :root { --bg:#0d1426; --surface:#16203a; --surface-2:#1f2c4d; --text:#f2f4f8; --muted:#9aa3b2; --accent:#5b8cff; --good:#5bbf72; --line:#2c3c63; --prio1:#5b8cff; --prio2:#6f7fc0; --prio3:#48557a; }
  html.rosa { --bg:#2a1420; --surface:#3a1e2e; --surface-2:#4d2740; --text:#fdf0f6; --muted:#d7a9bf; --accent:#ff3d8f; --good:#4bbf8a; --line:#5a2f45; --prio1:#ff3d8f; --prio2:#db7ba6; --prio3:#a86e8a; }
  * { box-sizing:border-box; }
  body { margin:0; background:#05080f; color:var(--text); font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; -webkit-font-smoothing:antialiased; padding:20px 12px 60px; }
  .head { max-width:900px; margin:0 auto 12px; }
  h1 { font-size:1.25rem; margin:0 0 4px; }
  .sub { color:var(--muted); font-size:.88rem; margin:0; line-height:1.5; max-width:720px; }
  .bar { max-width:900px; margin:14px auto; display:flex; gap:8px; flex-wrap:wrap; align-items:center; }
  .bar button { border:1px solid var(--line); background:#0d1426; color:var(--muted); font:inherit; font-size:.85rem; padding:8px 15px; border-radius:999px; cursor:pointer; }
  .bar button.on { background:var(--accent); color:#fff; border-color:transparent; }
  .stage { display:flex; justify-content:center; margin-top:22px; }
  .phone { width:390px; min-height:730px; background:var(--bg); border-radius:38px; border:1px solid var(--line); overflow:hidden; position:relative; box-shadow:0 30px 80px rgba(0,0,0,.5); display:flex; flex-direction:column; }
  .notch { position:absolute; top:0; left:50%; transform:translateX(-50%); width:140px; height:26px; background:#05080f; border-radius:0 0 16px 16px; z-index:20; }
  .sheet { margin:44px 12px 12px; background:var(--surface); border:1px solid var(--line); border-radius:20px; padding:18px 16px; flex:1; overflow-y:auto; }
  .sheet h3 { margin:0 0 14px; font-size:1.15rem; }
  .seg { display:flex; background:var(--surface-2); border-radius:12px; padding:4px; gap:4px; margin-bottom:16px; }
  .seg button { flex:1; border:none; background:none; color:var(--muted); font:inherit; font-size:.9rem; font-weight:600; padding:9px 6px; border-radius:9px; cursor:pointer; }
  .seg button.on { background:var(--accent); color:#fff; }
  .hint { color:var(--muted); font-size:.84rem; line-height:1.5; margin:0 0 12px; }
  .hint code { background:var(--surface-2); padding:1px 5px; border-radius:5px; font-size:.85em; }
  textarea, input.txt { width:100%; background:var(--surface-2); border:1px solid var(--line); border-radius:11px; color:var(--text); font:inherit; font-size:1rem; padding:12px; }
  textarea { min-height:120px; resize:none; }
  .row { display:flex; gap:10px; margin-top:14px; }
  .btn { flex:1; border:none; border-radius:12px; padding:13px 10px; font:inherit; font-weight:700; font-size:.95rem; cursor:pointer; }
  .btn.primary { background:var(--accent); color:#fff; }
  .btn.claude { background:#d97757; color:#fff; } .btn.gpt { background:#10a37f; color:#fff; }
  .field { margin-bottom:13px; }
  .field label { display:block; font-size:.76rem; text-transform:uppercase; letter-spacing:.04em; color:var(--muted); font-weight:700; margin-bottom:7px; }
  .stepper { display:flex; align-items:center; background:var(--surface-2); border:1px solid var(--line); border-radius:10px; width:fit-content; overflow:hidden; }
  .stepper button { width:44px; height:44px; border:none; background:none; color:var(--accent); font-size:1.4rem; cursor:pointer; }
  .stepper .val { min-width:48px; text-align:center; font-weight:700; }
  .tertiary { text-align:center; margin-top:12px; }
  .tertiary button { background:none; border:none; color:var(--accent); font:inherit; font-weight:600; font-size:.88rem; cursor:pointer; text-decoration:underline; }
  .divider { display:flex; align-items:center; gap:10px; color:var(--muted); font-size:.76rem; text-transform:uppercase; letter-spacing:.04em; font-weight:700; margin:18px 0 12px; }
  .divider::before, .divider::after { content:""; flex:1; height:1px; background:var(--line); }
  /* Slå upp: riktning + tappbart exempel-fält + resultatrader med prio */
  .dir { display:flex; align-items:center; gap:10px; background:var(--surface-2); border:1px solid var(--line); border-radius:11px; padding:9px 12px; margin-bottom:12px; }
  .dir .lang { font-weight:600; } .dir .lang.dim{ color:var(--muted);font-weight:500; }
  .dir .swap { margin-left:auto; width:36px;height:36px;border-radius:9px;border:none;background:var(--bg);color:var(--accent);font-size:1.1rem;cursor:pointer; }
  .arrow { color:var(--muted); }
  .qpill { width:100%; text-align:left; background:var(--surface-2); border:1px dashed var(--line); border-radius:11px; color:var(--text); font:inherit; font-size:1rem; padding:12px; cursor:pointer; }
  .qpill small { display:block; color:var(--muted); font-size:.72rem; margin-top:4px; }
  .res-row { display:flex; align-items:center; gap:10px; background:var(--surface-2); border-radius:11px; padding:10px 12px; margin-top:10px; }
  .res-w { flex:1; font-size:.95rem; } .res-w .to{ font-weight:700; } .res-w .from{ color:var(--muted); }
  .rprio { display:inline-flex; gap:5px; }
  .rprio button { width:30px; height:30px; border:1px solid var(--line); background:var(--bg); color:var(--muted); font:inherit; font-weight:700; font-size:.82rem; border-radius:8px; cursor:pointer; }
  .rprio button.on[data-p="1"]{ background:var(--prio1); border-color:transparent; color:#fff; }
  .rprio button.on[data-p="2"]{ background:var(--prio2); border-color:transparent; color:#fff; }
  .rprio button.on[data-p="3"]{ background:var(--prio3); border-color:transparent; color:#fff; }
  .res-lead { font-size:.78rem; color:var(--muted); margin:14px 0 2px; }
  /* auto-urklipp */
  .clip { display:flex; align-items:center; gap:10px; background:color-mix(in srgb, var(--good) 18%, var(--surface-2)); border:1px solid color-mix(in srgb, var(--good) 45%, transparent); border-radius:11px; padding:10px 12px; margin-bottom:10px; font-size:.85rem; }
  .clip .cbtn { margin-left:auto; border:none; background:var(--good); color:#06210f; font:inherit; font-weight:700; font-size:.82rem; padding:6px 12px; border-radius:8px; cursor:pointer; }
  .step-ind { font-size:.76rem; color:var(--muted); margin-bottom:12px; }
  .back-link { background:none;border:none;color:var(--accent);font:inherit;font-weight:600;cursor:pointer;padding:0;margin-top:12px; }
  .note { max-width:390px; margin:12px auto 0; color:var(--muted); font-size:.8rem; text-align:center; line-height:1.5; }
</style>
</head>
<body>
<div class="head">
  <h1>Enhetlig "Lägg till ord" – förslag v3</h1>
  <p class="sub">Huvudriktning: <b>A · allt-i-ett</b>. Manuellt är enkelt (prio via <code>;</code> sist). Slå upp är interaktiv – tryck i fältet för att växla exempel (glass / glass;godis;läsk), och sätt prio per uppslaget ord. Växla förslag/segment/tema.</p>
</div>
<div class="bar">
  <button data-prop="A" class="on">Förslag A · allt-i-ett</button>
  <button data-prop="B">Förslag B · AI som guide</button>
  <span style="flex:1"></span>
  <button id="themeBtn">🌸 Rosa tema</button>
</div>

<div class="stage">
  <div class="phone"><div class="notch"></div>
    <div class="sheet">
      <h3>Lägg till ord</h3>
      <div class="seg" id="seg">
        <button data-m="manual" class="on">Manuellt</button>
        <button data-m="lookup">Slå upp</button>
        <button data-m="ai">AI</button>
      </div>
      <div id="modeBody"></div>
    </div>
  </div>
</div>
<p class="note" id="note"></p>

<script>
let prop="A", mode="manual", aiStep=1;
let dir="sv2it", multi=false, searched=false;  // Slå upp-state
const body=document.getElementById("modeBody"), note=document.getElementById("note");
const FOREIGN="Italienska";
// Hårdkodade uppslag (mockup): svenska↔italienska
const DATA = {
  sv2it: { single:[["glass","gelato"]], multi:[["glass","gelato"],["godis","caramelle"],["läsk","bibita"]] },
  it2sv: { single:[["gelato","glass"]], multi:[["gelato","glass"],["caramelle","godis"],["bibita","läsk"]] },
};
const queryText = () => (multi ? DATA[dir].multi : DATA[dir].single).map(p=>p[0]).join(";");

function manualHTML() {
  return `<p class="hint">En rad per glosa: <b>utländskt;svenskt</b> — t.ex. <code>grazie;tack</code>. Valfri prio (1–3) sist: <code>grazie;tack;1</code></p>
    <textarea placeholder="ciao;hej&#10;grazie;tack;1"></textarea>
    <div class="row"><button class="btn primary">Lägg till</button></div>`;
}
function lookupHTML() {
  const from = dir==="sv2it" ? "Svenska" : FOREIGN, to = dir==="sv2it" ? FOREIGN : "Svenska";
  const pairs = multi ? DATA[dir].multi : DATA[dir].single;
  let res = "";
  if (searched) {
    res = `<div class="res-lead">Uppslaget – tryck en prio (valfritt) och lägg till:</div>` +
      pairs.map((p,i)=>`<div class="res-row">
        <span class="res-w"><span class="from">${p[0]}</span> <span class="arrow">→</span> <span class="to">${p[1]}</span></span>
        <span class="rprio" data-row="${i}"><button data-p="1">1</button><button data-p="2">2</button><button data-p="3">3</button></span>
      </div>`).join("") +
      `<div class="row"><button class="btn primary">Lägg till ${pairs.length>1?pairs.length+" ord":"ordet"}</button></div>`;
  } else {
    res = `<div class="row"><button class="btn primary" id="doLookup">Slå upp</button></div>`;
  }
  return `<div class="dir"><span class="lang">${from}</span><span class="arrow">→</span><span class="lang dim">${to}</span>
      <button class="swap" id="swap" title="Byt riktning">⇄</button></div>
    <button class="qpill" id="qpill">${queryText()}<small>tryck för att växla exempel (ett ord ↔ flera med ;)</small></button>
    ${res}`;
}
function copyPromptTertiary(){ return `<div class="tertiary"><button id="copyPrompt">⧉ Kopiera prompt (för annan AI)</button></div>`; }
function pasteBlock(){ return `<div class="clip"><span>📋</span><span>Hittade ett svar i urklipp</span><button class="cbtn">Klistra in</button></div>
    <textarea placeholder="…eller klistra in AI:ns svar här"></textarea>
    <div class="row"><button class="btn primary">Lägg till från svaret</button></div>`; }
function aiSend(withStep){ return `${withStep?`<div class="step-ind">Steg 1 av 2 · skicka frågan</div>`:""}
    <div class="field"><label>Antal ord/fraser</label><div class="stepper"><button>−</button><span class="val">30</span><button>+</button></div></div>
    <div class="field"><label>Tema</label><input class="txt" type="text" value="Sjöfart"></div>
    <div class="row"><button class="btn claude" data-go>Öppna i Claude</button><button class="btn gpt" data-go>Öppna i ChatGPT</button></div>
    ${copyPromptTertiary()}`; }
function aiHTML() {
  if(prop==="A") return aiSend(false)+`<div class="divider">När du fått svaret</div>`+pasteBlock();
  if(aiStep===1) return aiSend(true);
  return `<div class="step-ind">Steg 2 av 2 · klistra in svaret</div>`+pasteBlock()+`<button class="back-link" data-back>← Skicka igen</button>`;
}
const NOTES = {
  manual: ()=>"Manuellt: enkelt som förut – en rad per glosa, prio läggs valfritt sist med ; (t.ex. grazie;tack;1).",
  lookup: ()=>`Slå upp: ⇄ byter riktning. Tryck i fältet för att växla exempel (glass ↔ glass;godis;läsk). Efter uppslag sätter du prio per ord innan du lägger till.`,
  ai: ()=> prop==="A" ? "Förslag A: skicka/kopiera prompt + klistra in svaret i samma vy (auto-urklipp vid retur)." : "Förslag B: guide i två steg.",
};
function render() {
  body.innerHTML = mode==="manual"?manualHTML():mode==="lookup"?lookupHTML():aiHTML();
  note.textContent = NOTES[mode]();
  if(mode==="lookup"){
    document.getElementById("swap").onclick=()=>{ dir=dir==="sv2it"?"it2sv":"sv2it"; searched=false; render(); };
    document.getElementById("qpill").onclick=()=>{ multi=!multi; searched=false; render(); };
    const dl=document.getElementById("doLookup"); if(dl) dl.onclick=()=>{ searched=true; render(); };
    body.querySelectorAll(".rprio").forEach(seg=>seg.querySelectorAll("button").forEach(btn=>btn.onclick=()=>{
      const on=btn.classList.contains("on"); seg.querySelectorAll("button").forEach(x=>x.classList.remove("on")); if(!on) btn.classList.add("on");
    }));
  }
  if(mode==="ai"){
    const cp=document.getElementById("copyPrompt"); if(cp) cp.onclick=()=>{ cp.textContent="Kopierat ✓ – klistra in i valfri AI"; if(prop==="B") setTimeout(()=>{aiStep=2;render();},400); };
    if(prop==="B"){ body.querySelectorAll("[data-go]").forEach(b=>b.onclick=()=>{aiStep=2;render();}); const bk=body.querySelector("[data-back]"); if(bk) bk.onclick=()=>{aiStep=1;render();}; }
  }
}
document.getElementById("seg").onclick=(e)=>{const b=e.target.closest("[data-m]");if(!b)return;mode=b.dataset.m;aiStep=1;searched=false;
  document.querySelectorAll("#seg button").forEach(x=>x.classList.toggle("on",x===b));render();};
document.querySelectorAll(".bar [data-prop]").forEach(b=>b.onclick=()=>{prop=b.dataset.prop;aiStep=1;
  document.querySelectorAll(".bar [data-prop]").forEach(x=>x.classList.toggle("on",x===b));render();});
document.getElementById("themeBtn").onclick=()=>{const r=document.documentElement.classList.toggle("rosa");document.getElementById("themeBtn").textContent=r?"🌙 Mörkt tema":"🌸 Rosa tema";};
render();
</script>
</body>
</html>
