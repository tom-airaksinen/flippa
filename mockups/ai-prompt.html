<!doctype html>
<html lang="sv">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Flippa – AI-prompt med prio (2 UX-varianter)</title>
<style>
  :root { --bg:#0d1426; --surface:#16203a; --surface-2:#1f2c4d; --text:#f2f4f8; --muted:#9aa3b2; --accent:#5b8cff; --good:#5bbf72; --line:#2c3c63; }
  html.rosa { --bg:#2a1420; --surface:#3a1e2e; --surface-2:#4d2740; --text:#fdf0f6; --muted:#d7a9bf; --accent:#ff3d8f; --good:#4bbf8a; --line:#5a2f45; }
  * { box-sizing:border-box; }
  body { margin:0; background:#05080f; color:var(--text); font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; -webkit-font-smoothing:antialiased; padding:20px 12px 60px; }
  .head { max-width:900px; margin:0 auto 12px; }
  h1 { font-size:1.25rem; margin:0 0 4px; }
  .sub { color:var(--muted); font-size:.88rem; margin:0; line-height:1.5; max-width:700px; }
  .bar { max-width:900px; margin:14px auto; display:flex; gap:8px; flex-wrap:wrap; }
  .bar button { border:1px solid var(--line); background:#0d1426; color:var(--muted); font:inherit; font-size:.85rem; padding:8px 15px; border-radius:999px; cursor:pointer; }
  .bar button.on { background:var(--accent); color:#fff; border-color:transparent; }
  .stage { display:flex; justify-content:center; margin-top:22px; }
  .phone { width:390px; min-height:760px; background:var(--bg); border-radius:38px; border:1px solid var(--line); overflow:hidden; position:relative; box-shadow:0 30px 80px rgba(0,0,0,.5); display:flex; flex-direction:column; }
  .notch { position:absolute; top:0; left:50%; transform:translateX(-50%); width:140px; height:26px; background:#05080f; border-radius:0 0 16px 16px; z-index:20; }
  .topbar { display:flex; align-items:center; gap:10px; padding:40px 16px 12px; border-bottom:1px solid var(--line); }
  .topbar .ib { width:38px; height:38px; border-radius:10px; background:var(--surface); border:none; color:var(--text); display:inline-flex; align-items:center; justify-content:center; font-size:1.2rem; }
  .topbar .title { font-weight:700; font-size:1.05rem; }
  .body { padding:18px 16px 24px; overflow-y:auto; }

  /* Variant 1 – dialog */
  .lead { color:var(--muted); font-size:.9rem; line-height:1.5; margin:0 0 18px; }
  .field { margin-bottom:16px; }
  .field label { display:block; font-size:.78rem; text-transform:uppercase; letter-spacing:.04em; color:var(--muted); font-weight:700; margin-bottom:7px; }
  .stepper { display:flex; align-items:center; gap:0; background:var(--surface); border:1px solid var(--line); border-radius:12px; width:fit-content; overflow:hidden; }
  .stepper button { width:46px; height:46px; border:none; background:none; color:var(--accent); font-size:1.5rem; cursor:pointer; }
  .stepper .val { min-width:54px; text-align:center; font-size:1.15rem; font-weight:700; font-variant-numeric:tabular-nums; }
  .txt { width:100%; background:var(--surface); border:1px solid var(--line); border-radius:12px; color:var(--text); font:inherit; font-size:1rem; padding:12px 13px; }
  .txt:focus { outline:none; border-color:var(--accent); }
  .send-row { display:flex; gap:10px; margin-top:22px; }
  .send-btn { flex:1; border:none; border-radius:13px; padding:14px 10px; font:inherit; font-weight:700; font-size:.98rem; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:8px; color:#fff; }
  .send-btn.claude { background:#d97757; } .send-btn.gpt { background:#10a37f; }
  .send-btn .ai-ico { font-size:1.1rem; }
  .alt-copy { margin-top:14px; text-align:center; }
  .alt-copy button { background:none; border:none; color:var(--muted); font:inherit; font-size:.85rem; text-decoration:underline; cursor:pointer; }
  .hint2 { color:var(--muted); font-size:.78rem; line-height:1.5; margin-top:16px; padding-top:14px; border-top:1px solid var(--line); }

  /* Variant 2 – lång prompt med expandering (dagens flöde) */
  .ai-tip-lead { color:var(--muted); font-size:.88rem; line-height:1.5; margin:0 0 14px; }
  .ai-app-link { background:none; border:none; color:var(--accent); font:inherit; font-weight:600; cursor:pointer; padding:0; text-decoration:underline; }
  .promptbox { position:relative; background:var(--surface); border:1px solid var(--line); border-radius:14px; padding:14px 14px 12px; }
  .promptbox pre { margin:0; white-space:pre-wrap; word-break:break-word; font-family:inherit; font-size:.86rem; line-height:1.55; color:var(--text); }
  .promptbox.collapsed pre { max-height:130px; overflow:hidden; -webkit-mask-image:linear-gradient(to bottom,#000 70%,transparent); mask-image:linear-gradient(to bottom,#000 70%,transparent); }
  .pb-actions { display:flex; align-items:center; justify-content:space-between; margin-top:10px; }
  .expand-btn { background:none; border:none; color:var(--accent); font:inherit; font-weight:600; font-size:.88rem; cursor:pointer; padding:0; }
  .copy-btn { display:inline-flex; align-items:center; gap:7px; background:var(--surface-2); border:none; color:var(--text); font:inherit; font-size:.85rem; font-weight:600; padding:8px 13px; border-radius:10px; cursor:pointer; }
</style>
</head>
<body>
<div class="head">
  <h1>AI-prompt med prio – 2 UX-varianter</h1>
  <p class="sub">Samma sammansatta "avancerade" prompt (befintlig genus/artikel-mekanik + prio), men två sätt att presentera den. Claude/ChatGPT-knapparna öppnar tjänsten på riktigt med prompten ifylld (bra att testa). Växla variant + tema nedan.</p>
</div>
<div class="bar">
  <button data-v="1" class="on">Variant 1 · Dialog → skicka</button>
  <button data-v="2">Variant 2 · Lång prompt (expandera)</button>
  <span style="flex:1"></span>
  <button id="themeBtn">🌸 Rosa tema</button>
</div>

<div class="stage">
  <div class="phone">
    <div class="notch"></div>
    <div class="topbar"><button class="ib">←</button><span class="title" id="scrTitle">Fyll lektionen med AI</span></div>
    <div class="body" id="scrBody"></div>
  </div>
</div>

<script>
// Sammansatt avancerad prompt (samma som skulle byggas i appen; genusNote per språk).
// I appen sätts lang + genusNote från ämnet; här visar vi italienska (artikel-strategi).
const GENDER_NOTE_IT = "För substantiv: ta med bestämd artikel så genus framgår, men håll den svenska sidan i obestämd form.";
function buildPrompt(count, theme, lang, genderNote) {
  return `Ge mig ${count} bra ord och fraser på temat "${theme}" på ${lang}.

Format: en rad per glosa – "ord/fras;svensk översättning;prio" med semikolon emellan.${genderNote ? " " + genderNote : ""}

Prio (1–3) = hur central glosan är för just DET HÄR temat, inte hur vanlig den är i språket i stort:
1 = kärnord man måste kunna för temat
2 = vanliga, nyttiga ord
3 = mer perifera eller nischade ord

Välj orden efter vad som är bra att kunna för temat – låt ALDRIG prio styra urvalet. Som riktmärke (inte kvot) vid 30+ glosor: ungefär hälften 1:or, en tredjedel 2:or, resten 3:or. Korta vardagsteman kan sakna 3:or helt. Sätt prio först när du valt orden.

Exempel på radformat: la nave;fartyg;1`;
}

const CNT_KEY = "flippa-ai-count-mock";
function getCount() { const v = parseInt(localStorage.getItem(CNT_KEY), 10); return Number.isFinite(v) ? v : 30; }
function setCount(v) { v = Math.max(5, Math.min(100, v)); localStorage.setItem(CNT_KEY, v); return v; }
let theme = "Sjöfart";
const LANG = "italienska";

function currentPrompt() { return buildPrompt(getCount(), theme, LANG, GENDER_NOTE_IT); }
function openAI(base) { window.open(base + encodeURIComponent(currentPrompt()), "_blank"); }

function renderV1() {
  document.getElementById("scrTitle").textContent = "Fyll lektionen med AI";
  const b = document.getElementById("scrBody");
  b.innerHTML = `
    <p class="lead">Låt en AI föreslå ord och fraser för lektionen. Justera vid behov och öppna i din AI – prompten följer med ifylld.</p>
    <div class="field"><label>Antal ord/fraser</label>
      <div class="stepper"><button id="dec">−</button><span class="val" id="cntv">${getCount()}</span><button id="inc">+</button></div></div>
    <div class="field"><label>Tema</label>
      <input class="txt" id="theme" type="text" value="${theme.replace(/"/g,'&quot;')}" /></div>
    <div class="send-row">
      <button class="send-btn claude" id="toClaude"><span class="ai-ico">✳️</span> Öppna i Claude</button>
      <button class="send-btn gpt" id="toGpt"><span class="ai-ico">🤖</span> Öppna i ChatGPT</button>
    </div>
    <div class="alt-copy"><button id="copyOnly">eller kopiera prompten</button></div>
    <p class="hint2">Tips: öppnar AI:n på webben/i appen med prompten redan i skrivrutan. Kopiera sedan svaret och klistra in via ＋ Lägg till.</p>`;
  document.getElementById("dec").onclick = () => { document.getElementById("cntv").textContent = setCount(getCount() - 5); };
  document.getElementById("inc").onclick = () => { document.getElementById("cntv").textContent = setCount(getCount() + 5); };
  document.getElementById("theme").oninput = (e) => { theme = e.target.value || "lektionen"; };
  document.getElementById("toClaude").onclick = () => openAI("https://claude.ai/new?q=");
  document.getElementById("toGpt").onclick = () => openAI("https://chatgpt.com/?q=");
  document.getElementById("copyOnly").onclick = () => { navigator.clipboard && navigator.clipboard.writeText(currentPrompt()); document.getElementById("copyOnly").textContent = "kopierat ✓"; };
}

function renderV2() {
  document.getElementById("scrTitle").textContent = "Ta hjälp av en AI";
  const b = document.getElementById("scrBody");
  b.innerHTML = `
    <p class="ai-tip-lead">Ge denna prompt till <button class="ai-app-link" id="toGpt2">ChatGPT</button>/<button class="ai-app-link" id="toClaude2">Claude</button>, kopiera sedan svaret och klistra in via ＋ Lägg till.</p>
    <div class="promptbox collapsed" id="pbox"><pre id="ptext">${currentPrompt().replace(/</g,'&lt;')}</pre></div>
    <div class="pb-actions">
      <button class="expand-btn" id="expand">Visa hela prompten ▾</button>
      <button class="copy-btn" id="copy2">⧉ Kopiera</button>
    </div>`;
  document.getElementById("expand").onclick = () => {
    const pb = document.getElementById("pbox"); pb.classList.toggle("collapsed");
    document.getElementById("expand").textContent = pb.classList.contains("collapsed") ? "Visa hela prompten ▾" : "Dölj ▴";
  };
  document.getElementById("copy2").onclick = () => { navigator.clipboard && navigator.clipboard.writeText(currentPrompt()); document.getElementById("copy2").textContent = "Kopierat ✓"; };
  document.getElementById("toClaude2").onclick = () => openAI("https://claude.ai/new?q=");
  document.getElementById("toGpt2").onclick = () => openAI("https://chatgpt.com/?q=");
}

const R = { "1": renderV1, "2": renderV2 };
document.querySelectorAll(".bar [data-v]").forEach((b) => b.onclick = () => {
  document.querySelectorAll(".bar [data-v]").forEach((x) => x.classList.toggle("on", x === b));
  R[b.dataset.v]();
});
document.getElementById("themeBtn").onclick = () => { const r = document.documentElement.classList.toggle("rosa"); document.getElementById("themeBtn").textContent = r ? "🌙 Mörkt tema" : "🌸 Rosa tema"; };
renderV1();
</script>
</body>
</html>
