<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Flippa</title>
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#15171c" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Status / laddning -->
  <div id="status-banner" class="hidden"></div>

  <!-- Ämnesskärm -->
  <section id="subjects-screen" class="screen">
    <header class="app-header">
      <h1>📚 Flippa</h1>
      <button id="add-subject" class="icon-btn" title="Nytt ämne">＋</button>
      <button id="menu-btn" class="icon-btn" title="Backup">⋯</button>
    </header>
    <div id="subjects-list" class="list"></div>
    <div id="version-tag" class="version-tag"></div>
  </section>

  <!-- Lektionsskärm -->
  <section id="lessons-screen" class="screen hidden">
    <header class="app-header">
      <button class="back-btn" data-back="subjects">←</button>
      <h1 id="lessons-title"></h1>
      <button id="edit-subject" class="icon-btn" title="Redigera ämne">✎</button>
      <button id="add-lesson" class="icon-btn" title="Ny lektion">＋</button>
    </header>
    <div class="settings-row">
      <label for="session-limit">Kort per pass</label>
      <select id="session-limit">
        <option value="0">Alla</option>
        <option value="10">10</option>
        <option value="15">15</option>
        <option value="20">20</option>
        <option value="30">30</option>
        <option value="50">50</option>
      </select>
    </div>
    <button id="due-btn" class="primary-btn hidden"></button>
    <button id="translate-subject" class="primary-btn alt hidden">🔎 Slå upp ord</button>
    <div id="lessons-list" class="list"></div>
  </section>

  <!-- Lektionseditor -->
  <section id="editor-screen" class="screen hidden">
    <header class="app-header">
      <button class="back-btn" data-back="lessons">←</button>
      <h1 id="editor-title"></h1>
      <button id="rename-lesson" class="icon-btn" title="Byt namn">✎</button>
      <button id="delete-lesson" class="icon-btn" title="Ta bort lektion">🗑</button>
    </header>
    <div class="editor-actions">
      <button id="add-words" class="primary-btn">＋ Lägg till ord</button>
      <button id="translate-words" class="primary-btn alt">🔎 Slå upp & lägg till</button>
    </div>
    <div class="editor-toolbar">
      <button id="sort-btn" class="icon-btn" title="Sortera">⇅</button>
      <input type="search" id="editor-search" class="editor-search" placeholder="Filtrera ord…" autocomplete="off" />
    </div>
    <div id="editor-list" class="list"></div>
  </section>

  <!-- Träningsskärm -->
  <section id="training-screen" class="screen hidden">
    <div id="train-bar">
      <button class="back-btn" data-back="lessons">←</button>
      <select id="dir-select">
        <option value="b2f">Från svenska</option>
        <option value="f2b">Till svenska</option>
        <option value="mixed">Blandat</option>
      </select>
      <span id="progress-pill">0</span>
    </div>

    <div id="swipe-feedback"></div>

    <main class="card-area">
      <div class="card-stack">
        <button id="edit-card-btn" class="hidden" title="Redigera ordet">✎</button>
        <button id="speak-btn" class="hidden" title="Uttala">🔊</button>
        <div id="card" class="card">
          <div class="card-inner">
            <div class="card-front" id="card-front"></div>
            <div class="card-back" id="card-back"></div>
          </div>
        </div>
      </div>
    </main>

    <div id="autospeak-row" class="autospeak-row hidden">
      <span>🔊 Automatisk uppläsning</span>
      <label class="switch">
        <input type="checkbox" id="autospeak-toggle" />
        <span class="slider"></span>
      </label>
    </div>

    <footer class="train-footer">
      <div class="hint-row">
        <span>👈 kan inte</span>
        <span>👆 kan bra</span>
        <span>kan 👉</span>
      </div>
      <div class="hint-row hint-down">
        <span>👇 hopplöst</span>
      </div>
    </footer>
  </section>

  <!-- Klar-skärm -->
  <section id="congrats-screen" class="screen hidden">
    <div class="congrats-emoji">🎉</div>
    <h2>Klart!</h2>
    <p id="congrats-sub">Du har gått igenom alla kort.</p>
    <button id="congrats-done" class="primary-btn green">Grymt!</button>
    <button id="congrats-continue" class="primary-btn alt hidden"></button>
  </section>

  <!-- Modal -->
  <div id="modal-root" class="hidden"></div>

  <!-- Firebase compat-SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

  <script src="firebase-config.js"></script>
  <script src="data/seed.js"></script>
  <script src="app.js"></script>
</body>
</html>
