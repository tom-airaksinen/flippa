<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Flippa</title>
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#0d1426" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Status / laddning -->
  <div id="status-banner" class="hidden"></div>

  <!-- Ämnesskärm -->
  <section id="subjects-screen" class="screen">
    <header class="app-header">
      <h1><img src="icon-192.png" class="app-logo" alt="" /> Flippa</h1>
      <button id="add-subject" class="icon-btn" title="Nytt ämne">＋</button>
      <button id="menu-btn" class="icon-btn" title="Backup">⋯</button>
    </header>
    <div id="subjects-list" class="list"></div>
    <div id="version-tag" class="version-tag"></div>
  </section>

  <!-- Lektionsskärm -->
  <section id="lessons-screen" class="screen hidden">
    <header class="app-header">
      <button class="back-btn" data-back="subjects">←</button>
      <h1 id="lessons-title"></h1>
      <button id="edit-subject" class="icon-btn" title="Redigera ämne">✎</button>
      <button id="add-lesson" class="icon-btn" title="Ny lektion">＋</button>
    </header>
    <!-- Riktning + kort per pass (väljs här, läses vid sessionsstart) -->
    <div class="opt-row">
      <button class="opt-pill" id="dir-pill" type="button" aria-haspopup="true">
        <span class="opt-text"><span class="opt-lbl">RIKTNING</span><span class="opt-val" id="dir-val">Från svenska</span></span>
        <span class="opt-car">▾</span>
      </button>
      <button class="opt-pill k" id="limit-pill" type="button" aria-haspopup="true">
        <span class="opt-text"><span class="opt-lbl">KORT</span><span class="opt-val" id="limit-val">Alla</span></span>
        <span class="opt-car">▾</span>
      </button>
    </div>
    <div class="opt-chooser hidden" id="dir-chooser">
      <div class="opt-segs" id="dir-segs">
        <button type="button" data-v="b2f">Från svenska</button>
        <button type="button" data-v="f2b">Till svenska</button>
        <button type="button" data-v="mixed">Blandat</button>
      </div>
    </div>
    <div class="opt-chooser hidden" id="limit-chooser">
      <div class="opt-segs wrap" id="limit-segs">
        <button type="button" data-v="0">Alla</button>
        <button type="button" data-v="10">10</button>
        <button type="button" data-v="15">15</button>
        <button type="button" data-v="20">20</button>
        <button type="button" data-v="30">30</button>
        <button type="button" data-v="50">50</button>
      </div>
    </div>
    <!-- Dolda "backing stores": all befintlig läs-/spar-/import-logik använder dessa -->
    <select id="dir-select" class="hidden">
      <option value="b2f">Från svenska</option>
      <option value="f2b">Till svenska</option>
      <option value="mixed">Blandat</option>
    </select>
    <select id="session-limit" class="hidden">
      <option value="0">Alla</option>
      <option value="10">10</option>
      <option value="15">15</option>
      <option value="20">20</option>
      <option value="30">30</option>
      <option value="50">50</option>
    </select>
    <button id="due-btn" class="primary-btn hidden"></button>
    <button id="translate-subject" class="primary-btn alt hidden">🔎 Slå upp ord</button>
    <div class="editor-toolbar">
      <div class="search-wrap">
        <input type="search" id="lessons-search" class="editor-search" placeholder="Sök i alla lektioner…" autocomplete="off" />
        <button class="search-clear hidden" tabindex="-1">✕</button>
      </div>
    </div>
    <div id="lessons-list" class="list"></div>
  </section>

  <!-- Lektionseditor -->
  <section id="editor-screen" class="screen hidden">
    <header class="app-header">
      <button class="back-btn" data-back="lessons">←</button>
      <h1 id="editor-title"></h1>
      <button id="rename-lesson" class="icon-btn" title="Byt namn">✎</button>
      <button id="delete-lesson" class="icon-btn" title="Ta bort lektion">🗑</button>
    </header>
    <div class="editor-actions">
      <button id="add-words" class="primary-btn">＋ Lägg till ord</button>
      <button id="translate-words" class="primary-btn alt">🔎 Slå upp & lägg till</button>
    </div>
    <div class="editor-toolbar">
      <button id="sort-btn" class="icon-btn" title="Sortera">⇅</button>
      <div class="search-wrap">
        <input type="search" id="editor-search" class="editor-search" placeholder="Filtrera ord…" autocomplete="off" />
        <button class="search-clear hidden" tabindex="-1">✕</button>
      </div>
    </div>
    <div id="editor-list" class="list"></div>
  </section>

  <!-- Träningsskärm -->
  <section id="training-screen" class="screen hidden">
    <div id="train-bar">
      <button class="back-btn" data-back="lessons">←</button>
      <span id="progress-pill">0</span>
    </div>

    <main class="card-area">
      <div class="card-stack">
        <button id="edit-card-btn" class="hidden" title="Redigera ordet">✎</button>
        <button id="speak-btn" class="hidden" title="Uttala">🔊</button>
        <div id="card" class="card">
          <div class="card-inner">
            <div class="card-front" id="card-front"></div>
            <div class="card-back" id="card-back">
              <span id="card-answer"></span>
              <span id="card-hint" class="card-hint"></span>
            </div>
          </div>
        </div>
      </div>
      <div id="swipe-feedback"></div>
    </main>

    <div id="autospeak-row" class="autospeak-row hidden">
      <span>🔊 Automatisk uppläsning</span>
      <label class="switch">
        <input type="checkbox" id="autospeak-toggle" />
        <span class="slider"></span>
      </label>
    </div>

    <button id="handsfree-btn" class="hf-btn">🎙 Handsfree<span id="hf-status" class="hf-status"></span></button>

    <footer class="train-footer">
      <div class="hint-row">
        <span>👈 kan inte</span>
        <span>👆 kan bra</span>
        <span>kan 👉</span>
      </div>
      <div class="hint-row hint-down">
        <span>👇 hopplöst</span>
      </div>
    </footer>
  </section>

  <!-- Klar-skärm -->
  <section id="congrats-screen" class="screen hidden">
    <div class="congrats-emoji">🎉</div>
    <h2>Klart!</h2>
    <p id="congrats-sub">Du har gått igenom alla kort.</p>
    <button id="congrats-done" class="primary-btn green">Grymt!</button>
    <button id="congrats-continue" class="primary-btn alt hidden"></button>
  </section>

  <!-- Modal -->
  <div id="modal-root" class="hidden"></div>

  <!-- Firebase compat-SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

  <script src="firebase-config.js"></script>
  <script src="data/seed.js"></script>
  <script src="app.js"></script>
</body>
</html>
